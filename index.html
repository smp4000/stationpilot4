<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wareneingang Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#111827;color:#f3f4f6;min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
header{background:#1f2937;padding:10px 14px;border-bottom:2px solid #374151;
  display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
header h1{font-size:16px;color:#f87171;font-weight:700;letter-spacing:0.5px;}
#scan-count{background:#ef4444;color:#fff;padding:3px 10px;border-radius:12px;font-size:13px;font-weight:700;}

/* ── SCAN INPUT ── */
#scan-area{background:#1f2937;padding:10px 14px;border-bottom:1px solid #374151;position:sticky;top:48px;z-index:9;}
#scan-input{
  width:100%;padding:12px 14px;font-size:20px;letter-spacing:2px;
  border:2px solid #374151;border-radius:8px;background:#111827;color:#fff;
  text-align:center;outline:none;font-family:monospace;
}
#scan-input:focus{border-color:#ef4444;}
#scan-status{text-align:center;margin-top:6px;font-size:12px;color:#6b7280;min-height:16px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#scan-status.ok{color:#34d399;}
#scan-status.err{color:#f87171;}
#scan-status.info{color:#60a5fa;}

/* ── ITEM LIST ── */
#items-list{padding:8px 12px 180px 12px;}

.item-card{
  background:#1f2937;border:1px solid #374151;border-radius:8px;
  padding:9px 10px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
}
.item-nr{font-size:10px;color:#6b7280;min-width:28px;font-family:monospace;}
.item-info{flex:1;min-width:0;}
.item-ean{font-size:11px;color:#9ca3af;font-family:monospace;}
.item-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.item-name.known{color:#f9fafb;}
.item-name.unknown{color:#6b7280;font-style:italic;font-weight:400;}
.menge-ctrl{display:flex;align-items:center;gap:4px;background:#111827;border-radius:20px;padding:3px 8px;}
.mbtn{background:none;border:none;color:#ef4444;font-size:22px;font-weight:700;cursor:pointer;
  padding:0 3px;line-height:1;-webkit-tap-highlight-color:transparent;}
.mval{font-size:15px;font-weight:700;min-width:22px;text-align:center;}
.delbtn{background:none;border:none;color:#4b5563;font-size:16px;cursor:pointer;
  padding:0 4px;-webkit-tap-highlight-color:transparent;}

/* ── FOOTER ── */
#footer{
  position:fixed;bottom:0;left:0;right:0;
  background:#1f2937;border-top:2px solid #374151;
  padding:10px 14px 14px;
}
#meta-row{display:flex;gap:8px;margin-bottom:8px;}
#meta-row input{
  flex:1;padding:9px 10px;border:1px solid #374151;border-radius:6px;
  background:#111827;color:#fff;font-size:14px;outline:none;
}
#meta-row input:focus{border-color:#60a5fa;}
#meta-row input::placeholder{color:#6b7280;}
#btn-row{display:flex;gap:8px;}
.btn-pdf{
  flex:3;padding:13px;background:#ef4444;color:#fff;border:none;
  border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn-pdf:disabled{background:#7f1d1d;color:#9ca3af;cursor:not-allowed;}
.btn-new{
  flex:1;padding:13px;background:#374151;color:#9ca3af;border:none;
  border-radius:8px;font-size:13px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

/* ── EMPTY STATE ── */
#empty-state{text-align:center;padding:50px 20px;color:#4b5563;}
#empty-state .icon{font-size:52px;}
#empty-state p{margin-top:12px;font-size:13px;line-height:1.6;}

/* ── TOAST ── */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:#1e3a5f;color:#93c5fd;padding:8px 18px;border-radius:20px;
  font-size:13px;opacity:0;transition:all 0.2s;pointer-events:none;z-index:100;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <h1>📦 Wareneingang</h1>
  <span id="scan-count">0 Pos.</span>
</header>

<div id="scan-area">
  <input type="text" id="scan-input" placeholder="Scanner bereit..."
    autocomplete="off" autocorrect="off" autocapitalize="off"
    spellcheck="false" inputmode="numeric">
  <div id="scan-status">Warte auf Scan…</div>
</div>

<div id="items-list">
  <div id="empty-state">
    <div class="icon">🔍</div>
    <p>Noch keine Artikel gescannt.<br>Einfach scannen – der Cursor ist immer aktiv.</p>
  </div>
</div>

<div id="footer">
  <div id="meta-row">
    <input type="text"  id="lieferant"  placeholder="Lieferant">
    <input type="date"  id="lieferdatum">
  </div>
  <div id="btn-row">
    <button class="btn-pdf" id="btn-pdf" onclick="generatePDF()">📄 PDF erstellen</button>
    <button class="btn-new" onclick="neueErfassung()">🗑 Neu</button>
  </div>
</div>

<!-- Barcode canvas (hidden) -->
<canvas id="bc" style="display:none"></canvas>
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────
let items     = [];   // {ean, article_name, found, menge}
let sessionId = crypto.randomUUID();
let saveTimer = null;

const API = 'api.php';

// ─────────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────────
document.getElementById('lieferdatum').value = new Date().toISOString().split('T')[0];

const inp = document.getElementById('scan-input');
inp.focus();

// Immer re-focus wenn sonst geklickt wird
document.addEventListener('click',    e => { if (e.target !== inp) refocus(); });
document.addEventListener('touchend', e => { if (e.target !== inp) setTimeout(refocus, 80); });

function refocus() { inp.focus(); }

// ─────────────────────────────────────────────────
//  Scanner Input – Enter triggert Verarbeitung
// ─────────────────────────────────────────────────
let buffer = '';
let bufTimer = null;

inp.addEventListener('input', () => {
  clearTimeout(bufTimer);
  bufTimer = setTimeout(() => {
    // Manche Geräte ohne Enter-Emulation: nach 200ms ohne Input auswerten
    const val = inp.value.trim();
    if (val.length >= 8) triggerScan(val);
  }, 200);
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    clearTimeout(bufTimer);
    const val = inp.value.trim();
    inp.value = '';
    if (val.length >= 8) triggerScan(val);
    e.preventDefault();
  }
});

async function triggerScan(raw) {
  inp.value = '';
  const ean = raw.replace(/[^0-9]/g, '');
  if (ean.length < 8 || ean.length > 13) {
    setStatus('⚠ Ungültig: ' + raw, 'err');
    return;
  }
  await processScan(ean);
  setTimeout(refocus, 60);
}

// ─────────────────────────────────────────────────
//  EAN verarbeiten
// ─────────────────────────────────────────────────
async function processScan(ean) {
  // Doppelt → Menge addieren
  const existing = items.find(i => i.ean === ean);
  if (existing) {
    existing.menge++;
    renderList();
    setStatus('✓ ' + (existing.article_name || ean) + ' — Menge: ' + existing.menge, 'ok');
    debounceSave();
    return;
  }

  setStatus('🔍 Suche ' + ean + '…', 'info');

  let article_name = null;
  let found = false;

  try {
    const res  = await fetch(`${API}?action=lookup&ean=${ean}`);
    const data = await res.json();
    found        = data.found || false;
    article_name = found ? (data.article_name || null) : null;
  } catch(e) {
    setStatus('⚠ DB nicht erreichbar – EAN gespeichert', 'err');
  }

  items.push({ ean, article_name, found, menge: 1 });
  renderList();

  if (found) {
    setStatus('✓ ' + (article_name || ean), 'ok');
  } else {
    setStatus('⚠ Unbekannte EAN: ' + ean, 'err');
  }

  debounceSave();
}

// ─────────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────────
function renderList() {
  document.getElementById('scan-count').textContent = items.length + ' Pos.';
  const list = document.getElementById('items-list');

  if (items.length === 0) {
    list.innerHTML = `<div id="empty-state">
      <div class="icon">🔍</div>
      <p>Noch keine Artikel gescannt.<br>Einfach scannen – der Cursor ist immer aktiv.</p>
    </div>`;
    return;
  }

  list.innerHTML = items.map((item, idx) => `
    <div class="item-card" id="card-${idx}">
      <span class="item-nr">${pad3(idx+1)}</span>
      <div class="item-info">
        <div class="item-ean">${esc(item.ean)}</div>
        <div class="item-name ${item.found ? 'known' : 'unknown'}">
          ${item.found ? esc(item.article_name || item.ean) : 'Unbekannt'}
        </div>
      </div>
      <div class="menge-ctrl">
        <button class="mbtn" onclick="chg(${idx},-1)">−</button>
        <span  class="mval" id="mv-${idx}">${item.menge}</span>
        <button class="mbtn" onclick="chg(${idx},+1)">+</button>
      </div>
      <button class="delbtn" onclick="del(${idx})">✕</button>
    </div>
  `).join('');
}

function chg(idx, d) {
  items[idx].menge = Math.max(1, items[idx].menge + d);
  const el = document.getElementById('mv-'+idx);
  if (el) el.textContent = items[idx].menge;
  debounceSave();
  setTimeout(refocus, 60);
}

function del(idx) {
  items.splice(idx, 1);
  renderList();
  debounceSave();
  setTimeout(refocus, 60);
}

// ─────────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('scan-status');
  el.textContent = msg;
  el.className   = type;
}

function pad3(n) { return String(n).padStart(3,'0'); }
function esc(s)  { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────────
//  Session speichern (debounced)
// ─────────────────────────────────────────────────
function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveSession, 1500);
}

async function saveSession() {
  if (items.length === 0) return;
  try {
    await fetch(`${API}?action=save`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        session_id:  sessionId,
        lieferant:   document.getElementById('lieferant').value.trim(),
        lieferdatum: document.getElementById('lieferdatum').value,
        items: items.map(i => ({ean: i.ean, article_name: i.article_name, menge: i.menge}))
      })
    });
  } catch(e) { /* silent */ }
}

// ─────────────────────────────────────────────────
//  Neue Erfassung
// ─────────────────────────────────────────────────
function neueErfassung() {
  if (items.length > 0 && !confirm('Alle ' + items.length + ' Positionen löschen und neu beginnen?')) return;
  items     = [];
  sessionId = crypto.randomUUID();
  document.getElementById('lieferant').value  = '';
  document.getElementById('lieferdatum').value = new Date().toISOString().split('T')[0];
  renderList();
  setStatus('Warte auf Scan…', '');
  refocus();
}

// ─────────────────────────────────────────────────
//  Barcode-Bild erzeugen (Canvas → base64)
// ─────────────────────────────────────────────────
function makeBarcodeImage(ean) {
  const canvas = document.getElementById('bc');
  try {
    JsBarcode(canvas, ean, {
      format:       ean.length === 8 ? 'EAN8' : 'EAN13',
      width:        2,
      height:       60,
      displayValue: false,
      margin:       2,
      background:   '#ffffff',
      lineColor:    '#000000'
    });
    return canvas.toDataURL('image/png');
  } catch(e) {
    return null;
  }
}

// ─────────────────────────────────────────────────
//  PDF generieren
// ─────────────────────────────────────────────────
async function generatePDF() {
  if (items.length === 0) { alert('Keine Artikel gescannt!'); return; }

  const btn = document.getElementById('btn-pdf');
  btn.disabled    = true;
  btn.textContent = '⏳ Erstelle PDF…';

  await saveSession();

  try {
    const { jsPDF } = window.jspdf;

    const lieferant = document.getElementById('lieferant').value.trim() || '—';
    const datum     = document.getElementById('lieferdatum').value || new Date().toISOString().split('T')[0];

    // Layout-Konstanten (mm, A4 portrait)
    const PW = 210, PH = 297;
    const ML = 8, MR = 8, MT = 8, MB = 6;
    const COLS = 3, ROWS = 8;
    const PER_PAGE = COLS * ROWS;
    const HDR_H  = 20;

    const useW = PW - ML - MR;
    const useH = PH - MT - MB - HDR_H;
    const CW   = useW / COLS;
    const CH   = useH / ROWS;

    const totalPages = Math.ceil(items.length / PER_PAGE);

    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

    for (let pg = 0; pg < totalPages; pg++) {
      if (pg > 0) doc.addPage();

      // ── Kopfzeile ──
      doc.setFontSize(13);
      doc.setFont('helvetica','bold');
      doc.setTextColor(0);
      doc.text('EAN-Scanntableau', ML, MT + 6);

      doc.setFontSize(10);
      doc.setFont('helvetica','normal');
      doc.text('Seite ' + (pg+1) + ' / ' + totalPages, PW - MR, MT + 6, {align:'right'});

      doc.setFontSize(8.5);
      doc.text('Lieferant: ' + lieferant + '   |   Datum: ' + formatDate(datum),
               ML, MT + 12);

      doc.setDrawColor(180);
      doc.setLineWidth(0.3);
      doc.line(ML, MT + 14.5, PW - MR, MT + 14.5);
      doc.setDrawColor(0);

      // ── Zellen ──
      const startIdx = pg * PER_PAGE;
      const endIdx   = Math.min(startIdx + PER_PAGE, items.length);

      for (let i = startIdx; i < endIdx; i++) {
        const pos  = i - startIdx;
        const col  = pos % COLS;
        const row  = Math.floor(pos / COLS);

        const cx = ML + col * CW;
        const cy = MT + HDR_H + row * CH;

        const item = items[i];

        // Rahmen
        doc.setLineWidth(0.25);
        doc.setDrawColor(0);
        doc.rect(cx, cy, CW, CH);

        // Laufende Nummer
        doc.setFontSize(7.5);
        doc.setFont('helvetica','normal');
        doc.setTextColor(80);
        doc.text(pad3(i+1), cx + 1.5, cy + 4);

        // Barcode-Bild
        const bcImg = makeBarcodeImage(item.ean);
        const bcW   = CW - 6;
        const bcH   = CH * 0.40;
        const bcX   = cx + 3;
        const bcY   = cy + 5;

        if (bcImg) {
          doc.addImage(bcImg, 'PNG', bcX, bcY, bcW, bcH);
        }

        // EAN-Nummer
        const eanY = bcY + bcH + 3.5;
        doc.setFontSize(7);
        doc.setFont('helvetica','normal');
        doc.setTextColor(0);
        doc.text(item.ean, cx + CW/2, eanY, {align:'center'});

        // Artikelname (falls bekannt)
        if (item.found && item.article_name) {
          doc.setFontSize(6.5);
          doc.setFont('helvetica','bold');
          const name = item.article_name.length > 24
            ? item.article_name.substring(0,24)+'…'
            : item.article_name;
          doc.text(name, cx + CW/2, eanY + 3.8, {align:'center', maxWidth: CW-4});
        }

        // Menge (unten rechts)
        doc.setFontSize(7.5);
        doc.setFont('helvetica','bold');
        doc.setTextColor(0);
        doc.text('Menge: ' + item.menge, cx + CW - 1.5, cy + CH - 1.5, {align:'right'});
      }
    }

    // Dateiname
    const safeLief = lieferant.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,'_').substring(0,20);
    doc.save(`Wareneingang_${datum}_${safeLief}.pdf`);
    toast('✓ PDF gespeichert');

  } catch(e) {
    alert('PDF-Fehler: ' + e.message);
    console.error(e);
  }

  btn.disabled    = false;
  btn.textContent = '📄 PDF erstellen';
  setTimeout(refocus, 150);
}

function formatDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  return d+'.'+m+'.'+y;
}

// ─────────────────────────────────────────────────
//  Einmalig: Tabelle anlegen (beim ersten Öffnen)
// ─────────────────────────────────────────────────
(async () => {
  try {
    await fetch(`${API}?action=setup`);
  } catch(e) { /* silent */ }
})();
</script>
</body>
</html>
